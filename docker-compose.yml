services:
  db:
    image: postgres:16-alpine
    container_name: smartroom_db_prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: smartroom
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartroom_backend_prod
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@db:5432/smartroom
      HA_URL: ${HA_URL}
      HA_TOKEN: ${HA_TOKEN}
      # ─── Variables inyectadas ───
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES}
      TELEMETRY_INTERVAL_SECONDS: ${TELEMETRY_INTERVAL_SECONDS}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smartroom_frontend_prod
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data_prod: