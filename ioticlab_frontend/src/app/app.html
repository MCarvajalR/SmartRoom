<div class="main-wrapper">
  <!-- Solo renderizamos el Sidebar si el usuario está logueado -->
  @if (auth.isLoggedIn()) {
    <app-sidebar></app-sidebar>
  }

  <main class="app-content">
    <!-- El Topbar debería ir aquí si lo tienes creado -->
    @if (auth.isLoggedIn()) {
      <app-topbar></app-topbar>
    }
    
    <router-outlet />
  </main>
</div>
