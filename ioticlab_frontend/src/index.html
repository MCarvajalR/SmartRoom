<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>DAMBA — Panel de Monitoreo</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <!-- Dark/light mode sin flash: lee preferencia antes de renderizar -->
  <script>
    (function() {
      const stored = null; // localStorage bloqueado en iframes — usar null
      const sys    = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', stored ?? sys);
    })();
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
